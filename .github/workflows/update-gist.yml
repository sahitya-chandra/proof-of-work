name: Update contributions gist

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  update-gist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install PyGithub python-dotenv
      - name: Update gist
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python create_gist.py
