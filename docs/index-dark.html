<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>proof of work · sahitya-chandra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-hover: #1c232c;
      --border: #30363d;
      --border-soft: #21262d;
      --fg: #e6edf3;
      --fg-dim: #9da7b3;
      --fg-faint: #6e7681;
      --accent: #06b6d4;
      --accent-glow: rgba(6, 182, 212, 0.45);
      --accent-2: #14b8a6;
      --merged: #3fb950;
      --open: #58a6ff;
      --closed: #f85149;
    }

    * { box-sizing: border-box; }
    html, body { background: var(--bg); color: var(--fg); margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      background-image:
        radial-gradient(ellipse 600px 400px at 20% -10%, rgba(6, 182, 212, 0.18), transparent 70%),
        radial-gradient(ellipse 500px 300px at 100% 30%, rgba(20, 184, 166, 0.12), transparent 70%);
      background-attachment: fixed;
    }
    code, .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace; }

    main { max-width: 920px; margin: 0 auto; padding: 56px 24px 96px; }

    .switch {
      display: flex;
      gap: 6px;
      font-size: 0.75rem;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .switch a {
      color: var(--fg-faint);
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      transition: all 0.15s;
    }
    .switch a:hover { color: var(--fg); border-color: var(--accent); }
    .switch a.current {
      color: var(--fg);
      border-color: var(--accent);
      background: rgba(6, 182, 212, 0.15);
    }

    h1.title {
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 28px var(--accent-glow));
    }
    .subtitle { color: var(--fg-dim); margin: 0 0 28px; font-size: 1rem; }
    .subtitle b { color: var(--fg); }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      margin-bottom: 24px;
      padding: 16px 20px;
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      background: var(--panel);
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat .v { font-size: 1.3rem; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .stat .l { font-size: 0.72rem; color: var(--fg-faint); text-transform: uppercase; letter-spacing: 0.1em; }
    .stat.merged .v { color: var(--merged); }
    .stat.open .v { color: var(--open); }
    .stat.closed .v { color: var(--closed); }

    .filters { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
    .filters button {
      background: transparent;
      color: var(--fg-dim);
      border: 1px solid var(--border-soft);
      padding: 6px 14px;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 999px;
      transition: all 0.15s;
    }
    .filters button:hover { color: var(--fg); border-color: var(--accent); }
    .filters button.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 24px var(--accent-glow);
    }

    .org {
      border: 1px solid var(--border-soft);
      background: var(--panel);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .org:hover { border-color: var(--border); }
    .org.open { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(6, 182, 212, 0.2); }

    .org-header {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
    }
    .org-header:hover { background: var(--panel-hover); }

    .chev { color: var(--accent); font-size: 0.8rem; transition: transform 0.2s; width: 12px; }
    .org.open .chev { transform: rotate(90deg); }

    .org-logo {
      width: 28px; height: 28px; border-radius: 6px;
      object-fit: cover; background: #000;
    }

    .org-name { flex: 1; font-weight: 600; font-size: 1rem; }
    .org-meta { font-size: 0.85rem; color: var(--fg-dim); font-family: 'JetBrains Mono', monospace; }
    .org-meta b { color: var(--fg); }
    .org-meta .pill {
      display: inline-block; padding: 1px 8px; border-radius: 999px;
      background: rgba(63, 185, 80, 0.12); color: var(--merged);
      margin-left: 6px; font-size: 0.78rem;
    }

    .prs { display: none; border-top: 1px solid var(--border-soft); }
    .org.open .prs { display: block; }

    .pr {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 16px;
      align-items: baseline;
      padding: 10px 18px 10px 44px;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--border-soft);
    }
    .pr:last-child { border-bottom: none; }

    .pr-status {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 999px;
      text-align: center;
    }
    .pr-status.merged { background: rgba(63, 185, 80, 0.12); color: var(--merged); }
    .pr-status.open { background: rgba(88, 166, 255, 0.12); color: var(--open); }
    .pr-status.closed { background: rgba(248, 81, 73, 0.12); color: var(--closed); }

    .pr-title a {
      color: var(--fg); text-decoration: none;
      transition: color 0.15s;
    }
    .pr-title a:hover { color: var(--accent-2); }
    .pr-num { color: var(--fg-faint); margin-right: 6px; font-family: 'JetBrains Mono', monospace; }
    .pr-date { color: var(--fg-faint); font-size: 0.78rem; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }

    footer {
      margin-top: 48px; padding-top: 18px;
      border-top: 1px solid var(--border-soft);
      color: var(--fg-faint); font-size: 0.82rem;
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    footer a { color: var(--fg-dim); text-decoration: none; }
    footer a:hover { color: var(--accent-2); }

    @media (max-width: 600px) {
      main { padding: 28px 16px 64px; }
      .pr { grid-template-columns: 70px 1fr; padding-left: 24px; }
      .pr-date { grid-column: 2; }
    }
  </style>
</head>
<body>
<main>
  <nav class="switch">
    <a href="index.html">terminal</a>
    <a href="index-dark.html" class="current">dark</a>
    <a href="index-paper.html">paper</a>
    <a href="index-warm.html">sunset</a>
  </nav>

  <h1 class="title">Proof of Work</h1>
  <p class="subtitle">Open-source contributions by <b id="user">sahitya-chandra</b></p>

  <div class="stats" id="stats">
    <div class="stat"><span class="v">—</span><span class="l">loading</span></div>
  </div>

  <div class="filters" id="filters" hidden>
    <button data-filter="all" class="active">All</button>
    <button data-filter="merged">Merged</button>
    <button data-filter="open">Open</button>
    <button data-filter="closed">Closed</button>
  </div>

  <div id="list"></div>

  <footer>
    <span id="generated">&nbsp;</span>
    <span>
      <a href="https://github.com/sahitya-chandra" target="_blank" rel="noopener">github.com/sahitya-chandra</a>
      <span style="color: var(--fg-faint)"> · </span>
      <a href="https://github.com/sahitya-chandra/proof-of-work" target="_blank" rel="noopener">source</a>
    </span>
  </footer>
</main>

<script>
  const STATE_LABEL = { "Merged":"merged","Merged (indirect)":"merged","Open":"open","Closed":"closed" };
  let currentFilter = "all";
  let data = null;

  function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    const orgs = data.orgs.map(org => {
      const visible = org.prs.filter(pr => currentFilter === "all" || STATE_LABEL[pr.state] === currentFilter);
      return { ...org, visible };
    }).filter(org => org.visible.length > 0);

    if (orgs.length === 0) {
      list.innerHTML = '<div style="color: var(--fg-faint); padding: 16px;">No entries match this filter.</div>';
      return;
    }

    orgs.forEach(org => {
      const card = document.createElement("div");
      card.className = "org";

      const header = document.createElement("div");
      header.className = "org-header";
      header.innerHTML = `
        <span class="chev">▶</span>
        <img class="org-logo" alt="" src="https://github.com/${org.name}.png?size=64" onerror="this.style.visibility='hidden'">
        <span class="org-name">${escapeHtml(org.name)}</span>
        <span class="org-meta"><b>${org.visible.length}</b> ${org.visible.length === 1 ? "PR" : "PRs"}<span class="pill">${org.merged} merged</span></span>
      `;

      const prs = document.createElement("div");
      prs.className = "prs";
      org.visible.forEach(pr => {
        const row = document.createElement("div");
        row.className = "pr";
        const label = STATE_LABEL[pr.state] || "open";
        const date = pr.merged_at || pr.created_at;
        const display = label === "merged" && pr.state.includes("indirect") ? "merged*" : label;
        row.innerHTML = `
          <span class="pr-status ${label}">${display}</span>
          <span class="pr-title">${pr.number ? `<span class="pr-num">#${pr.number}</span>` : ""}<a href="${pr.url}" target="_blank" rel="noopener">${escapeHtml(pr.title)}</a></span>
          <span class="pr-date">${date || ""}</span>
        `;
        prs.appendChild(row);
      });

      header.onclick = () => card.classList.toggle("open");
      card.appendChild(header);
      card.appendChild(prs);
      list.appendChild(card);
    });
  }

  function renderStats() {
    const s = data.totals;
    document.getElementById("stats").innerHTML = `
      <div class="stat"><span class="v">${s.prs}</span><span class="l">total</span></div>
      <div class="stat merged"><span class="v">${s.merged}</span><span class="l">merged</span></div>
      <div class="stat open"><span class="v">${s.open}</span><span class="l">open</span></div>
      <div class="stat closed"><span class="v">${s.closed}</span><span class="l">closed</span></div>
      <div class="stat"><span class="v">${data.orgs.length}</span><span class="l">orgs</span></div>
    `;
    if (data.generated_at) document.getElementById("generated").textContent = "Generated " + data.generated_at;
    if (data.username) document.getElementById("user").textContent = data.username;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  document.querySelectorAll("#filters button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("#filters button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  fetch("./data.json", { cache: "no-store" })
    .then(r => { if (!r.ok) throw new Error("data.json not found"); return r.json(); })
    .then(json => { data = json; document.getElementById("filters").hidden = false; renderStats(); render(); })
    .catch(err => {
      document.getElementById("stats").innerHTML =
        `<div style="color: var(--closed)">Failed to load data.json — ${escapeHtml(err.message)}</div>`;
    });
</script>
</body>
</html>
