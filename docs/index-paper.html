<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PROOF OF WORK — sahitya-chandra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f1e8;
      --paper: #fffdf7;
      --ink: #000;
      --ink-soft: #2a2a2a;
      --ink-faint: #5c5c5c;
      --accent: #ff5b1f;
      --merged: #1a6b1a;
      --open: #1a4f8a;
      --closed: #a82020;
    }

    * { box-sizing: border-box; }
    html, body { background: var(--bg); color: var(--ink); margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
      background-image:
        repeating-linear-gradient(0deg, rgba(0,0,0,0.025) 0 1px, transparent 1px 24px),
        repeating-linear-gradient(90deg, rgba(0,0,0,0.025) 0 1px, transparent 1px 24px);
    }
    .mono { font-family: 'Space Mono', ui-monospace, monospace; }

    main { max-width: 920px; margin: 0 auto; padding: 56px 24px 96px; }

    .switch {
      display: flex; gap: 0; margin-bottom: 32px; flex-wrap: wrap;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em;
    }
    .switch a {
      color: var(--ink);
      text-decoration: none;
      padding: 6px 12px;
      border: 2px solid var(--ink);
      border-right-width: 0;
      background: var(--paper);
    }
    .switch a:last-child { border-right-width: 2px; }
    .switch a:hover { background: var(--ink); color: var(--paper); }
    .switch a.current { background: var(--ink); color: var(--paper); }

    .header {
      border: 3px solid var(--ink);
      background: var(--paper);
      padding: 28px 32px;
      margin-bottom: 24px;
      position: relative;
    }
    .header::after {
      content: ""; position: absolute;
      top: 8px; left: 8px; right: -8px; bottom: -8px;
      background: var(--ink); z-index: -1;
    }
    h1.title {
      font-size: clamp(2.6rem, 8vw, 4.6rem);
      font-weight: 700;
      line-height: 0.92;
      letter-spacing: -0.04em;
      margin: 0;
      text-transform: uppercase;
    }
    .subtitle {
      margin: 12px 0 0;
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      color: var(--ink-soft);
    }
    .subtitle b { color: var(--ink); }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0;
      margin-bottom: 24px;
      border: 3px solid var(--ink);
      background: var(--paper);
    }
    .stat {
      padding: 14px 16px;
      border-right: 2px solid var(--ink);
      font-family: 'Space Mono', monospace;
    }
    .stat:last-child { border-right: none; }
    .stat .l { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-faint); }
    .stat .v { font-size: 1.8rem; font-weight: 700; line-height: 1.1; }

    .filters { display: flex; gap: 0; margin-bottom: 18px; flex-wrap: wrap; }
    .filters button {
      background: var(--paper);
      color: var(--ink);
      border: 2px solid var(--ink);
      border-right-width: 0;
      padding: 8px 18px;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
    }
    .filters button:last-child { border-right-width: 2px; }
    .filters button:hover { background: var(--ink); color: var(--paper); }
    .filters button.active { background: var(--ink); color: var(--paper); }

    .org {
      border: 2px solid var(--ink);
      background: var(--paper);
      margin-bottom: 14px;
    }
    .org-header {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
    }
    .org-header:hover { background: var(--bg); }

    .toggle {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      width: 22px;
    }
    .org.open .toggle::before { content: "[—]"; }
    .org:not(.open) .toggle::before { content: "[+]"; }

    .org-logo {
      width: 28px; height: 28px;
      object-fit: cover;
      border: 2px solid var(--ink);
      background: var(--bg);
    }
    .org-name {
      flex: 1;
      font-weight: 700;
      font-size: 1.05rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .org-meta {
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      color: var(--ink-soft);
    }
    .org-meta b { color: var(--ink); }

    .prs { display: none; border-top: 2px solid var(--ink); }
    .org.open .prs { display: block; }

    .pr {
      display: grid;
      grid-template-columns: 90px 1fr auto;
      gap: 16px;
      align-items: baseline;
      padding: 12px 18px 12px 54px;
      border-bottom: 1px dashed var(--ink);
      font-size: 0.92rem;
    }
    .pr:last-child { border-bottom: none; }

    .pr-status {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 6px;
      border: 2px solid var(--ink);
      text-align: center;
      background: var(--paper);
    }
    .pr-status.merged { background: var(--merged); color: var(--paper); border-color: var(--merged); }
    .pr-status.open { background: var(--open); color: var(--paper); border-color: var(--open); }
    .pr-status.closed { background: var(--closed); color: var(--paper); border-color: var(--closed); }

    .pr-title a {
      color: var(--ink);
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
    }
    .pr-title a:hover { background: var(--accent); color: var(--paper); }
    .pr-num {
      font-family: 'Space Mono', monospace;
      color: var(--ink-faint);
      margin-right: 6px;
      font-weight: 700;
    }
    .pr-date {
      font-family: 'Space Mono', monospace;
      color: var(--ink-faint);
      font-size: 0.78rem;
      white-space: nowrap;
    }

    footer {
      margin-top: 48px;
      padding-top: 18px;
      border-top: 3px solid var(--ink);
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      color: var(--ink-soft);
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    footer a { color: var(--ink); text-decoration: underline; text-decoration-thickness: 2px; }
    footer a:hover { background: var(--accent); color: var(--paper); }

    @media (max-width: 600px) {
      main { padding: 28px 16px 64px; }
      .pr { grid-template-columns: 80px 1fr; padding-left: 28px; }
      .pr-date { grid-column: 2; }
    }
  </style>
</head>
<body>
<main>
  <nav class="switch">
    <a href="index.html">Terminal</a>
    <a href="index-dark.html">Dark</a>
    <a href="index-paper.html" class="current">Paper</a>
    <a href="index-warm.html">Sunset</a>
  </nav>

  <div class="header">
    <h1 class="title">Proof of Work</h1>
    <p class="subtitle">Open-source contributions · <b id="user">sahitya-chandra</b></p>
  </div>

  <div class="stats" id="stats">
    <div class="stat"><div class="l">Loading</div><div class="v">—</div></div>
  </div>

  <div class="filters" id="filters" hidden>
    <button data-filter="all" class="active">All</button>
    <button data-filter="merged">Merged</button>
    <button data-filter="open">Open</button>
    <button data-filter="closed">Closed</button>
  </div>

  <div id="list"></div>

  <footer>
    <span id="generated">&nbsp;</span>
    <span>
      <a href="https://github.com/sahitya-chandra" target="_blank" rel="noopener">github.com/sahitya-chandra</a>
      &nbsp;·&nbsp;
      <a href="https://github.com/sahitya-chandra/proof-of-work" target="_blank" rel="noopener">source</a>
    </span>
  </footer>
</main>

<script>
  const STATE_LABEL = { "Merged":"merged","Merged (indirect)":"merged","Open":"open","Closed":"closed" };
  let currentFilter = "all";
  let data = null;

  function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    const orgs = data.orgs.map(org => {
      const visible = org.prs.filter(pr => currentFilter === "all" || STATE_LABEL[pr.state] === currentFilter);
      return { ...org, visible };
    }).filter(org => org.visible.length > 0);

    if (orgs.length === 0) {
      list.innerHTML = '<div style="color: var(--ink-faint); padding: 16px;">No entries match this filter.</div>';
      return;
    }

    orgs.forEach(org => {
      const card = document.createElement("div");
      card.className = "org";

      const header = document.createElement("div");
      header.className = "org-header";
      header.innerHTML = `
        <span class="toggle"></span>
        <img class="org-logo" alt="" src="https://github.com/${org.name}.png?size=64" onerror="this.style.visibility='hidden'">
        <span class="org-name">${escapeHtml(org.name)}</span>
        <span class="org-meta"><b>${org.visible.length}</b> ${org.visible.length === 1 ? "PR" : "PRs"} · ${org.merged} merged</span>
      `;

      const prs = document.createElement("div");
      prs.className = "prs";
      org.visible.forEach(pr => {
        const row = document.createElement("div");
        row.className = "pr";
        const label = STATE_LABEL[pr.state] || "open";
        const date = pr.merged_at || pr.created_at;
        const display = label === "merged" && pr.state.includes("indirect") ? "merged*" : label;
        row.innerHTML = `
          <span class="pr-status ${label}">${display}</span>
          <span class="pr-title">${pr.number ? `<span class="pr-num">#${pr.number}</span>` : ""}<a href="${pr.url}" target="_blank" rel="noopener">${escapeHtml(pr.title)}</a></span>
          <span class="pr-date">${date || ""}</span>
        `;
        prs.appendChild(row);
      });

      header.onclick = () => card.classList.toggle("open");
      card.appendChild(header);
      card.appendChild(prs);
      list.appendChild(card);
    });
  }

  function renderStats() {
    const s = data.totals;
    document.getElementById("stats").innerHTML = `
      <div class="stat"><div class="l">Total</div><div class="v">${s.prs}</div></div>
      <div class="stat"><div class="l">Merged</div><div class="v" style="color: var(--merged)">${s.merged}</div></div>
      <div class="stat"><div class="l">Open</div><div class="v" style="color: var(--open)">${s.open}</div></div>
      <div class="stat"><div class="l">Closed</div><div class="v" style="color: var(--closed)">${s.closed}</div></div>
      <div class="stat"><div class="l">Orgs</div><div class="v">${data.orgs.length}</div></div>
    `;
    if (data.generated_at) document.getElementById("generated").textContent = "Generated " + data.generated_at;
    if (data.username) document.getElementById("user").textContent = data.username;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  document.querySelectorAll("#filters button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("#filters button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  fetch("./data.json", { cache: "no-store" })
    .then(r => { if (!r.ok) throw new Error("data.json not found"); return r.json(); })
    .then(json => { data = json; document.getElementById("filters").hidden = false; renderStats(); render(); })
    .catch(err => {
      document.getElementById("stats").innerHTML =
        `<div style="color: var(--closed); padding: 14px;">Failed to load data.json — ${escapeHtml(err.message)}</div>`;
    });
</script>
</body>
</html>
